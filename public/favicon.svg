<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="compassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#compassGradient)" stroke="#334155" stroke-width="8"/>
  
  <!-- 内圈 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#475569" stroke-width="4"/>
  
  <!-- 刻度线 -->
  <g stroke="#64748b" stroke-width="2">
    <line x1="256" y1="40" x2="256" y2="70" transform="rotate(0 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(30 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(60 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="70" transform="rotate(90 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(120 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(150 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="70" transform="rotate(180 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(210 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(240 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="70" transform="rotate(270 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(300 256 256)"/>
    <line x1="256" y1="40" x2="256" y2="60" transform="rotate(330 256 256)"/>
  </g>
  
  <!-- 方向标签 -->
  <text x="256" y="35" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="28" font-weight="bold">N</text>
  <text x="256" y="485" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24" font-weight="bold">S</text>
  <text x="30" y="261" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24" font-weight="bold">W</text>
  <text x="482" y="261" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24" font-weight="bold">E</text>
  
  <!-- 指南针指针 -->
  <polygon points="256,100 270,256 256,286 242,256" fill="url(#needleGradient)" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="256,412 270,256 256,226 242,256" fill="#334155" stroke="#475569" stroke-width="2"/>
  
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="20" fill="url(#needleGradient)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="256" cy="256" r="8" fill="#fef3c7"/>
</svg>
