name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking dist folder..."
          ls -la dist/
          echo "Checking index.html..."
          test -f dist/index.html && echo "✓ index.html found" || echo "✗ index.html NOT found"

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: |
          npx cap init "指南针APP" "com.compass.app" --web-dir=dist

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Sync Web App to Android
        run: |
          npx cap sync android

      - name: Verify Android Assets
        run: |
          echo "Checking Android assets..."
          ls -la android/app/src/main/assets/public/
          test -f android/app/src/main/assets/public/index.html && echo "✓ Android sync successful" || echo "✗ Android sync FAILED"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        id: build
        run: |
          cd android
          ./gradlew assembleDebug --warning-mode=all || ./gradlew assembleDebug --stacktrace

      - name: Verify APK exists
        run: |
          ls -lh android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk && echo "✓ APK created successfully" || echo "✗ APK NOT created"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: compass-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
